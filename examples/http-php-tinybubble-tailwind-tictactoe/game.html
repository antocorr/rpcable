<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RpcAble Tic Tac Toe Game</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet" />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            display: ['Baloo 2', 'sans-serif'],
                            body: ['Nunito', 'sans-serif'],
                        },
                        colors: {
                            citrus: '#ffab1f',
                            peel: '#ef6c00',
                            limeade: '#8dd82f',
                            rind: '#62af16',
                            cream: '#fff8eb',
                            shell: '#f6ead7',
                            ink: '#7a4309',
                        },
                        boxShadow: {
                            game: '0 24px 80px rgba(178, 105, 7, 0.2)',
                            bubble: '0 14px 26px rgba(153, 89, 8, 0.16)',
                        },
                    },
                },
            };
        </script>
        <style>
            * {
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
            }

            body {
                margin: 0;
                overflow: hidden;
                background:
                    radial-gradient(circle at 20% 14%, rgba(255,255,255,0.12), transparent 18%),
                    radial-gradient(circle at 82% 16%, rgba(202, 255, 110, 0.10), transparent 20%),
                    linear-gradient(180deg, #ffa12e 0%, #ffc52d 26%, #f3d86f 45%, #efe0bf 68%, #f7eddc 100%);
            }

            .hero-top {
                background: transparent;
            }

            .soft-card {
                background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,247,233,0.92));
                box-shadow:
                    0 12px 30px rgba(136, 87, 13, 0.14),
                    inset 0 1px 0 rgba(255,255,255,0.7);
            }

            .compact-match {
                min-height: 142px;
                position: relative;
            }

            .match-chat-btn {
                position: absolute;
                top: 10px;
                right: 10px;
                width: 38px;
                height: 38px;
                border-radius: 999px;
                display: grid;
                place-items: center;
                border: 1px solid rgba(255,255,255,0.95);
                background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,250,252,0.92));
                color: #64748b;
                box-shadow:
                    0 8px 16px rgba(100, 116, 139, 0.18),
                    inset 0 1px 0 rgba(255,255,255,0.8);
                cursor: pointer;
            }

            .grid-board {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 10px;
            }

            .board-cell {
                height: 76px;
                border-radius: 18px;
                background: rgba(255, 250, 241, 0.92);
                box-shadow: inset 0 0 0 1px rgba(255, 162, 0, 0.18);
                display: grid;
                place-items: center;
            }

            .mark-x,
            .mark-o {
                width: 40px;
                height: 40px;
                position: relative;
            }

            .mark-x::before,
            .mark-x::after {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                width: 44px;
                height: 8px;
                border-radius: 999px;
                background: linear-gradient(90deg, #ff8b1d, #ff6a00);
                transform-origin: center;
                box-shadow: 0 2px 8px rgba(255, 123, 25, 0.25);
            }

            .mark-x::before {
                transform: translate(-50%, -50%) rotate(45deg);
            }

            .mark-x::after {
                transform: translate(-50%, -50%) rotate(-45deg);
            }

            .mark-o {
                border-radius: 999px;
                border: 8px solid #7fd51a;
                box-shadow: 0 2px 8px rgba(127, 213, 26, 0.22);
            }

            .winner-pill {
                background: linear-gradient(180deg, #7fdb17 0%, #4ebc1a 100%);
                box-shadow: 0 10px 24px rgba(83, 173, 29, 0.28);
            }

            .bubble-chat-left,
            .bubble-chat-right {
                max-width: 82%;
                border-radius: 999px;
                padding: 10px 16px;
                font-weight: 700;
                font-size: 14px;
                line-height: 1.15;
                box-shadow: 0 6px 18px rgba(84, 67, 17, 0.1);
            }

            .bubble-chat-left {
                background: linear-gradient(180deg, #ffd85b 0%, #ffcf43 100%);
                color: #9d5200;
            }

            .bubble-chat-right {
                background: linear-gradient(180deg, #8ad93b 0%, #64ca29 100%);
                color: white;
                margin-left: auto;
            }

            .chat-panel {
                position: absolute;
                left: 0;
                right: 0;
                top: 138px;
                bottom: 78px;
                z-index: 6;
                padding: 0 14px;
                opacity: 0;
                pointer-events: none;
                transition: opacity .26s ease, transform .34s cubic-bezier(.2,.9,.2,1), max-height .34s cubic-bezier(.2,.9,.2,1);
                transform: translateY(18px) scale(.98);
                transform-origin: bottom center;
                max-height: none;
            }

            .chat-panel.open {
                opacity: 1;
                pointer-events: auto;
                transform: translateY(0) scale(1);
            }

            .chat-panel-card {
                border-radius: 30px;
                background: linear-gradient(180deg, rgba(255,248,236,0.94), rgba(255,248,236,0.99));
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                box-shadow: 0 20px 40px rgba(41, 31, 12, 0.12);
                padding: 14px;
                height: 100%;
                overflow: auto;
            }

            .input-bar-wrap {
                position: absolute;
                left: 14px;
                right: 14px;
                bottom: 14px;
                z-index: 7;
            }

            .input-shell {
                width: 100%;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 28px;
                background: linear-gradient(180deg, rgba(244, 239, 226, 0.96), rgba(238, 232, 219, 0.96));
                box-shadow:
                    0 12px 26px rgba(66, 47, 13, 0.12),
                    inset 0 1px 0 rgba(255,255,255,0.62);
            }

            .chat-input {
                flex: 1;
                min-width: 0;
                background: transparent;
                border: 0;
                outline: 0;
                font-size: 14px;
                font-weight: 700;
                color: #7a879a;
            }

            .send-icon-btn {
                width: 46px;
                height: 46px;
                border: 0;
                border-radius: 999px;
                color: white;
                display: grid;
                place-items: center;
                cursor: pointer;
                background: linear-gradient(180deg, #8ad93b 0%, #64ca29 100%);
                box-shadow: 0 10px 18px rgba(100, 202, 41, 0.25);
                flex: 0 0 auto;
            }

            .ios-toast {
                position: absolute;
                top: 56px;
                left: 14px;
                right: 14px;
                z-index: 9;
                border-radius: 24px;
                padding: 12px 14px;
                background: rgba(22, 26, 34, 0.84);
                color: white;
                backdrop-filter: blur(16px) saturate(1.1);
                -webkit-backdrop-filter: blur(16px) saturate(1.1);
                box-shadow: 0 14px 30px rgba(13, 15, 20, 0.28);
                opacity: 0;
                transform: translateY(-18px) scale(0.96);
                transform-origin: top center;
                pointer-events: none;
                transition:
                    opacity 0.26s ease,
                    transform 0.34s cubic-bezier(.2,.9,.2,1),
                    box-shadow 0.34s cubic-bezier(.2,.9,.2,1);
                will-change: opacity, transform;
            }

            .ios-toast.visible {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
                box-shadow: 0 18px 34px rgba(13, 15, 20, 0.34);
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(171, 99, 20, 0.22);
                border-radius: 999px;
            }
        </style>
    </head>
    <body class="min-h-screen font-body text-ink">
        <div id="app" class="min-h-screen"></div>
        <script type="module" src="./game.js"></script>
    </body>
</html>
